<script id="csinit" type="text/x-cindyscript">
//Script (CindyScript)
specialAngles= concat(
	apply(0..11, # * pi / 6),
	apply(0..3, pi / 4 + # * pi / 2)
);

angleTeX = [
	"$0 / 0^\circ \to (0, 0)$",
	"$\frac{\pi}{6} / 30^\circ \to \left(\frac{\sqrt{3}}{2}, \frac{1}{2}\right)$",
	"$\frac{\pi}{3} / 60^\circ \to \left(\frac{1}{2}, \frac{\sqrt{3}}{2}\right)$",
	"$\frac{\pi}{2} / 90^\circ \to (0, 1)$",
	"$\frac{2\pi}{3} / 120^\circ \to \left(-\frac{1}{2}, \frac{\sqrt{3}}{2}\right)$",
	"$\frac{5\pi}{6} / 150^\circ \to \left(-\frac{\sqrt{3}}{2}, \frac{1}{2}\right)$",
	"$\pi / 180^\circ \to (-1, 0)$",
	"$\frac{7\pi}{6} / 210^\circ \to \left(-\frac{\sqrt{3}}{2}, -\frac{1}{2}\right)$",
	"$\frac{4\pi}{3} / 240^\circ \to \left(-\frac{1}{2}, -\frac{\sqrt{3}}{2}\right)$",
	"$\frac{3\pi}{2} / 270^\circ \to (0, -1)$",
	"$\frac{5\pi}{3} / 300^\circ \to \left(\frac{1}{2}, -\frac{\sqrt{3}}{2}\right)$",
	"$\frac{11\pi}{6} / 330^\circ \to \left(\frac{\sqrt{3}}{2}, -\frac{1}{2}\right)$",
	"$\frac{\pi}{4} / 45^\circ \to \left(\frac{\sqrt{2}}{2}, \frac{\sqrt{2}}{2}\right)$",
	"$\frac{3\pi}{4} / 135^\circ \to \left(-\frac{\sqrt{2}}{2}, \frac{\sqrt{2}}{2}\right)$",
	"$\frac{5\pi}{4} / 225^\circ \to \left(-\frac{\sqrt{2}}{2}, -\frac{\sqrt{2}}{2}\right)$",
	"$\frac{7\pi}{4} / 315^\circ \to \left(\frac{\sqrt{2}}{2}, -\frac{\sqrt{2}}{2}\right)$"
];

snapDist = 0.1;

visMode = 1;

fractToText(denom, val) := if(abs(denom) < 1e-5, "\text{undefined}", text(val));
;

</script>
<script id="csdraw" type="text/x-cindyscript">
//Script (CindyScript)
linesize(2);
drawcircle(A, C0.radius); // Fix z-order :-(

bAngle = arctan2(B);

repeat(length(specialAngles),
	theta = specialAngles_#;
	vect = (cos(theta), sin(theta));
	pt = A + C0.radius * vect;
	draw(pt);

	if(|B, pt| < snapDist,
		B.xy = pt;
		align = if(abs(B.x) < 0.1, "mid", if(B.x < 0, "right", "left"));
		if(visMode == 1,
			offset = if(B.y + 1.0 < 0.1, 1.0, 0.5);
			drawtext(pt + vect * offset, angleTeX_#, align->align, size->15);
		);
	);
);

bAngle = arctan2(B); // Update from snap

if(visMode == 1,
	cosOfs = (C0.radius * cos(bAngle), 0);
	sinOfs = (0, C0.radius * sin(bAngle));

  draw(A, A + cosOfs, color->(1, 0, 0));
	draw(A + cosOfs, A + cosOfs + sinOfs, color->(0, 1, 0));

	draw(C, C + (|cosOfs|, 0), color->(1, 0, 0));
	drawtext(C + (0, 0.2), "$\cos\theta = " + text(cos(bAngle)) + "$", size->15);
	draw(D, D + (|sinOfs|, 0), color->(0, 1, 0));
	drawtext(D + (0, 0.2), "$\sin\theta = " + text(sin(bAngle)) + "$", size->15);

	drawText(D + (0, -0.5), "$\sin^2 \theta + \cos^2 \theta = " + text(sin(bAngle) ^ 2 + cos(bAngle) ^ 2) + "$", size->14);
);

if(visMode == 2,
	bAngleBound = arctan2(abs(B.x), B.y);
	axis = if(B.x < -0.1, (-C0.radius, 0), (C0.radius, 0));
	tanOfs = (0, C0.radius * tan(bAngleBound));
	secOfs = C0.radius / cos(bAngleBound) * (cos(bAngle), sin(bAngle));

	draw(A, A + axis);
	draw(A + axis, A + axis + tanOfs, color->(1, 0, 0));
	draw(A, A + secOfs, color->(0, 1, 0));

	draw(C, C + (|tanOfs|, 0), color->(1, 0, 0));
	drawtext(C + (0, 0.2), "$\tan\theta = " + fractToText(cos(bAngle), tan(bAngle)) + "$", size->15);

	draw(D, D + (|secOfs|, 0), color->(0, 1, 0));
	drawtext(D + (0, 0.2), "$\sec\theta = " + fractToText(cos(bAngle), 1 / cos(bAngle)) + "$", size->15);

	drawtext(A + (0, C0.radius + 0.5), "The triangle represents the absolute value of $\tan$ and $\sec$ and not their signs.", align->"mid");
);

if(visMode == 3,
	bAngleBound = arctan2(B.x, abs(B.y));
	axis = if(B.y < -0.1, (0, -C0.radius), (0, C0.radius));
	cotOfs = (C0.radius * cos(bAngleBound) / sin(bAngleBound), 0);
	cscOfs = C0.radius / sin(bAngleBound) * (cos(bAngle), sin(bAngle));

	draw(A, A + axis);
	draw(A + axis, A + axis + cotOfs, color->(1, 0, 0));
	draw(A, A + cscOfs, color->(0, 1, 0));

	draw(C, C + (|cotOfs|, 0), color->(1, 0, 0));
	drawtext(C + (0, 0.2), "$\cot\theta = " + fractToText(sin(bAngle), cos(bAngle) / sin(bAngle)) + "$", size->15);

	draw(D, D + (|cscOfs|, 0), color->(0, 1, 0));
	drawtext(D + (0, 0.2), "$\csc\theta = " + fractToText(sin(bAngle), 1 / sin(bAngle)) + "$", size->15);

	drawtext(A + (0, C0.radius + 0.5), "The triangle represents the absolute value of $\cot$ and $\csc$ and not their signs.", align->"mid");
);
;

</script>
    <script type="text/javascript">
var cdy = CindyJS({
  scripts: "cs*",

  },
  angleUnit: "°",
  geometry: [
    {name: "A", type: "Free", pos: [0.0, 0.0, 4.0], color: [0.0, 0.0, 0.0], pinned: true, size: 2.0, border: false},
    {name: "C0", type: "CircleByRadius", pos: {xx: -0.04, yy: -0.04, zz: 1.0, xy: 0.0, xz: 0.0, yz: 0.0}, color: [0.0, 0.0, 1.0], radius: 5.0, args: ["A"], visible: false, pinned: true, printname: "$C_{0}$"},
    {name: "B", type: "PointOnCircle", pos: [4.0, 3.9999999999999933, 1.1313708498984751], color: [1.0, 0.0, 0.0], args: ["C0"]},
    {name: "a", type: "Segment", color: [0.0, 0.0, 1.0], args: ["A", "B"], size: 2},
    {name: "C", type: "Free", pos: [2.0, -4.0, 0.6666666666666666], color: [1.0, 0.0, 0.0], pinned: true, size: 1.0},
    {name: "D", type: "Free", pos: [1.7142857142857135, -4.0, 0.5714285714285713], color: [1.0, 0.0, 0.0], pinned: true, size: 1.0},
    {name: "Text0", type: "Button", pos: [4.0, 4.0, -0.5714285714285714], color: [0.0, 0.0, 0.0], fillcolor: [1.0, 1.0, 1.0], fillalpha: 0.27272728085517883, script: "visMode = 1;", text: "$\\sin$ / $\\cos$"},
    {name: "Text1", type: "Button", pos: [-2.2857142857142856, -4.0, 0.5714285714285714], color: [0.0, 0.0, 0.0], fillcolor: [1.0, 1.0, 1.0], fillalpha: 0.27272728085517883, script: "visMode = 2;", text: "$\\tan$ / $\\sec$"},
    {name: "Text2", type: "Button", pos: [-0.5714285714285714, -4.0, 0.5714285714285714], color: [0.0, 0.0, 0.0], fillcolor: [1.0, 1.0, 1.0], fillalpha: 0.27272728085517883, script: "visMode = 3;", text: "$\\cot$ / $\\csc$"}
  ],
  ports: [{
    width: 600,
    height: 480,
    id: "CSCanvas",
    transform: [{visibleRect: [-10.5, 5.0, 10.5, -7.0]}],
    grid: 1.0,
    snap: true,
    background: "rgb(168,176,192)"
  }],
  csconsole: false,
  use: ["katex"],
  cinderella: {build: 2081, version: [3, 0, 2081]}
});
    </script>
